name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: |
        chmod +x SimpleLoginApp/gradlew
        chmod +x CalculatorApp/gradlew

    - name: Build SimpleLoginApp & Run Tests
      run: |
        cd SimpleLoginApp
        ./gradlew assembleDebug testDebugUnitTest

    - name: Build CalculatorApp & Run Tests
      run: |
        cd CalculatorApp
        ./gradlew assembleDebug testDebugUnitTest
